services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: clickpick_app
    environment:
      - NODE_ENV=production
      - ALLOWED_ORIGINS=https://e-kinun.com,https://www.e-kinun.com
      - MONGO_URI=mongodb://admin:eKinunMongo%212026%23Secure91@clickpick_mongodb:27017/database?authSource=admin
      - EMAIL_USER=${EMAIL_USER}
      - EMAIL_PASS=${EMAIL_PASS}
      - ADMIN_PASSWORD=eKinunAdmin%212026%23Secure91
    networks:
      - app-network
    restart: unless-stopped

  mongodb:
    image: mongo:4.4.29
    container_name: clickpick_mongodb
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: eKinunMongo!2026#Secure91
      MONGO_INITDB_DATABASE: database
    volumes:
      - ./mongo_data:/data/db
    networks:
      - app-network
    restart: unless-stopped

  mongo-express:
    image: mongo-express
    container_name: e-kinun-mongo-express-1
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_SERVER: clickpick_mongodb
      ME_CONFIG_MONGODB_ADMINUSERNAME: admin
      ME_CONFIG_MONGODB_ADMINPASSWORD: eKinunMongo%212026%23Secure91
      ME_CONFIG_MONGODB_URL: mongodb://admin:eKinunMongo%212026%23Secure91@clickpick_mongodb:27017/admin
    networks:
      - app-network
    restart: always

  nginx:
    image: nginx:alpine
    container_name: e-kinun-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certbot/www:/var/www/certbot:ro
      - ./certbot/conf:/etc/letsencrypt:ro
    depends_on:
      - app
    networks:
      - app-network
    restart: unless-stopped

  certbot:
    image: certbot/certbot
    container_name: certbot
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot

networks:
  app-network:
    driver: bridge