version: '3.9'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: clickpick_app
    ports:
      - "5000:5000"
    env_file:
      - ./backend/.env
    environment:
      - NODE_ENV=production
      - PORT=5000
      - MONGO_URI=mongodb://admin:eKinunMongo!2026%23Secure91@mongodb:27017/database?authSource=admin
      - ADMIN_NAME=Admin User
      - ADMIN_EMAIL=admin@clickandpick.com
      - ADMIN_PASSWORD=eKinunAdmin!2026#Secure91
    depends_on:
      - mongodb
    restart: unless-stopped



  mongodb:
    image: mongo:4.4.29
    container_name: clickpick_mongodb
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: eKinunMongo!2026#Secure91
      MONGO_INITDB_DATABASE: database
    # MongoDB port mapping removed to avoid conflict with local instance
    volumes:
      - ./mongo_data:/data/db
    restart: unless-stopped



  mongo-express:
    image: mongo-express
    restart: always
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_SERVER: clickpick_mongodb
      ME_CONFIG_MONGODB_PORT: 27017
      ME_CONFIG_MONGODB_ENABLE_ADMIN: "true"
      ME_CONFIG_MONGODB_ADMINUSERNAME: admin
      ME_CONFIG_MONGODB_ADMINPASSWORD: eKinunMongo!2026#Secure91
      ME_CONFIG_MONGODB_AUTH_DATABASE: admin
      ME_CONFIG_MONGODB_URL: mongodb://admin:eKinunMongo!2026%23Secure91@clickpick_mongodb:27017/admin