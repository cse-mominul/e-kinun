name: Deploy MERN App

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/mern-app:latest

      - name: Deploy to CloudStack VM via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          password: ${{ secrets.VM_PASSWORD }} # Ekhane password use kora hoyeche
          port: 8899
          script: |
            # Docker Hub-e login kora
            echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

            # Latest image pull kora
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/mern-app:latest

            # Persistent MongoDB container and network ensure kora
            docker network create e-kinun-network || true
            mkdir -p /opt/e-kinun/mongo-data

            docker stop e-kinun-mongodb || true
            docker rm e-kinun-mongodb || true
            docker run -d \
              --name e-kinun-mongodb \
              --network e-kinun-network \
              --restart always \
              -e MONGO_INITDB_ROOT_USERNAME=admin \
              -e MONGO_INITDB_ROOT_PASSWORD=eKinunMongo!2026#Secure91 \
              -e MONGO_INITDB_DATABASE=database \
              -v /opt/e-kinun/mongo-data:/data/db \
              mongo:4.4.29
            
            # Purono container thakle seta bondho o remove kora
            docker stop e-kinun-app || true
            docker rm e-kinun-app || true
            
            # Notoon container run kora
            docker run -d \
              --name e-kinun-app \
              --network e-kinun-network \
              --restart always \
              -e PORT=5000 \
              -e MONGO_URI="mongodb://admin:eKinunMongo!2026%23Secure91@e-kinun-mongodb:27017/database?authSource=admin" \
              -e JWT_SECRET="${{ secrets.JWT_SECRET }}" \
              -e EMAIL_USER="${{ secrets.EMAIL_USER }}" \
              -e EMAIL_PASS="${{ secrets.EMAIL_PASS }}" \
              -e NODE_ENV=production \
              ${{ secrets.DOCKERHUB_USERNAME }}/mern-app:latest
            
            # Oboybohrito image clean kora
            docker image prune -f